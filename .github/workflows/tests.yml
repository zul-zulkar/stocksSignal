name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install pandas (untuk uji sinyal teknikal)
        run: pip install "pandas>=2.0"
      - name: Run Python tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run JS tests (node:test)
        run: node --test tests/js/*.test.cjs
