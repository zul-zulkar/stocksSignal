name: Auto-refresh signals

on:
  schedule:
    - cron: '0 1 * * 1'   # Setiap Senin 01:00 UTC = 08:00 WIB
  workflow_dispatch:       # Bisa juga dijalankan manual dari tab Actions

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch live signals
        run: python scripts/fetch_signals.py

      - name: Commit updated signals
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.js
          git diff --staged --quiet || git commit -m "chore: auto-refresh signals $(date -u '+%Y-%m-%d')"
          git push
