name: Auto-refresh signals

on:
  schedule:
    - cron: '0 1 * * 1'   # Setiap Senin 01:00 UTC = 08:00 WIB
  workflow_dispatch:       # Bisa juga dijalankan manual dari tab Actions

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 55   # cegah run macet menghabiskan kuota (default GitHub 6 jam)
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch live signals
        run: python scripts/fetch_signals.py

      - name: Build immersive world dataset
        run: python scripts/build_world_data.py

      - name: Commit updated signals
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.js data/analyst.js data/meta.js data/world-data.js
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan data — lewati commit."
          else
            git commit -m "chore: auto-refresh signals $(date -u '+%Y-%m-%d')"
            # tarik dulu kalau ada commit baru dari workflow lain agar push tak ditolak
            git pull --rebase --autostash origin main || true
            git push
          fi
