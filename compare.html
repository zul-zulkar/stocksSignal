<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <title>Bandingkan Saham · Pluang Stock Signal</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f1117'/%3E%3Cpolyline points='10,44 24,30 34,38 54,14' fill='none' stroke='%234ade80' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='54' cy='14' r='5' fill='%234ade80'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="cmp-header">
    <a href="index.html" class="cmp-back">← Dashboard</a>
    <h1>⚖ Bandingkan 2 Saham</h1>
  </header>

  <div class="cmp-main">

    <!-- Pickers -->
    <div class="card">
      <div class="cmp-pickers" id="pickers">
        <div class="cmp-picker">
          <label for="input-a">Saham A</label>
          <input id="input-a" list="stock-datalist" placeholder="Cari ticker / nama…" autocomplete="off" spellcheck="false" />
        </div>
        <div class="cmp-picker">
          <label for="input-b">Saham B</label>
          <input id="input-b" list="stock-datalist" placeholder="Cari ticker / nama…" autocomplete="off" spellcheck="false" />
        </div>
        <div class="cmp-btn">
          <button class="cmp-go-btn" id="go-btn">Bandingkan</button>
        </div>
      </div>
      <datalist id="stock-datalist"></datalist>
    </div>

    <!-- Error -->
    <div class="cmp-error" id="cmp-error" style="display:none"></div>

    <!-- Result -->
    <div class="cmp-result" id="cmp-result"></div>

  </div>

  <script src="data/stocks.js"></script>
  <script src="js/signals.js"></script>
  <script src="js/compare.js"></script>
  <script>
    if (!window.STOCK_UNIVERSE || !window.STOCK_UNIVERSE.length) {
      document.getElementById("cmp-error").textContent = "Data saham gagal dimuat. Buka via server lokal atau GitHub Pages.";
      document.getElementById("cmp-error").style.display = "";
    }
  </script>
</body>
</html>
