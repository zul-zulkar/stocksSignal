<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Stock Signal — Dunia yang Hidup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#fff6e6; --espresso:#33220f; --espresso-2:#5a3f24;
    --jade:#9fe3b1; --jade-deep:#4f9e6a; --gold:#ffce7a; --gold-deep:#e0972f;
    --shadow:#6a5560; --fog:#e3ad72;
    --mono:"Space Mono",ui-monospace,monospace;
    --ui:"Archivo",system-ui,sans-serif;
    --disp:"Archivo Black","Archivo",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--fog);
    font-family:var(--ui);color:var(--espresso);-webkit-font-smoothing:antialiased;}

  #bg{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:0;}
  #vignette{position:fixed;inset:0;z-index:5;pointer-events:none;
    background:
      radial-gradient(120% 88% at 50% 30%, transparent 38%, rgba(46,24,8,.28) 78%, rgba(28,14,4,.52) 100%),
      linear-gradient(180deg, rgba(40,22,8,.18) 0%, transparent 18%, transparent 62%, rgba(26,13,4,.42) 100%);}
  #overlay{position:fixed;inset:0;z-index:10;pointer-events:none;}
  #labels{position:fixed;inset:0;z-index:15;pointer-events:none;overflow:hidden;}
  #scroll{position:fixed;inset:0;z-index:20;overflow-y:scroll;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;}
  #scroll::-webkit-scrollbar{display:none}
  #spacer{height:780vh;}

  /* ── loader ── */
  #loader{position:fixed;inset:0;z-index:90;background:
    radial-gradient(120% 90% at 70% 30%, #ffe6b0, #e3ad72 55%, #b5793c);
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    gap:22px;transition:opacity 1.2s ease;color:var(--espresso);}
  #loader.gone{opacity:0;pointer-events:none}
  .ld-mark{font-family:var(--disp);font-size:clamp(28px,5vw,56px);letter-spacing:-.02em;
    color:var(--cream);text-shadow:0 2px 24px rgba(80,40,10,.4)}
  .ld-bar{width:200px;height:3px;background:rgba(51,34,15,.2);border-radius:3px;overflow:hidden}
  .ld-bar i{display:block;height:100%;width:40%;background:var(--espresso);border-radius:3px;
    animation:ld 1.1s ease-in-out infinite}
  @keyframes ld{0%{transform:translateX(-120%)}100%{transform:translateX(360%)}}
  .ld-sub{font-family:var(--mono);font-size:12px;letter-spacing:.25em;text-transform:uppercase;opacity:.7}

  /* ── topbar ── */
  .topbar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
    align-items:center;padding:26px 40px;mix-blend-mode:normal;}
  .tb-left{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
  .brand{font-family:var(--disp);font-size:18px;letter-spacing:-.01em;color:var(--cream);
    display:flex;align-items:center;gap:10px;text-shadow:0 1px 12px rgba(70,35,8,.45)}
  .brand-dot{width:11px;height:11px;border-radius:50%;background:var(--jade);
    box-shadow:0 0 16px 3px var(--jade)}
  .brand-sub{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--espresso);opacity:.66}

  /* ── scenes ── */
  .scene{position:absolute;will-change:opacity,transform;}
  .scene-center{left:50%;transform:translateX(-50%);top:12%;width:min(1040px,92vw);text-align:center;}
  .scene-left{left:6vw;top:13%;width:min(640px,82vw);}
  .scene-right{right:6vw;top:10%;width:min(620px,84vw);text-align:right;}

  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--espresso);opacity:.8;display:flex;align-items:center;gap:14px;margin-bottom:18px;}
  .scene-center .eyebrow{justify-content:center}
  .scene-right .eyebrow{justify-content:flex-end}
  .eyebrow::before{content:"";width:34px;height:1.5px;background:currentColor;opacity:.5}
  .scene-right .eyebrow::before{order:2}
  .eyebrow.gold{color:var(--gold-deep)} .eyebrow.jade{color:var(--jade-deep)}

  .mega{font-family:var(--disp);font-weight:400;line-height:.92;margin:0;
    font-size:clamp(44px,7vw,118px);letter-spacing:-.025em;color:#fffaf0;
    text-shadow:0 4px 42px rgba(46,22,4,.6),0 2px 3px rgba(38,16,2,.55);}
  .mega em{font-style:normal;color:var(--jade);
    text-shadow:0 3px 32px rgba(30,80,48,.6),0 1px 2px rgba(12,40,22,.6)}
  .scene-left .eyebrow.gold ~ .mega em,.scene-left .mega em{color:var(--gold)}

  .lede{font-size:clamp(15px,1.3vw,19px);line-height:1.55;max-width:33ch;margin:22px 0 0;
    color:#1f1303;font-weight:600;
    text-shadow:0 0 18px rgba(255,247,228,.85),0 1px 2px rgba(255,247,228,.9)}
  .scene-center .lede{margin-left:auto;margin-right:auto}
  .scene-right .lede{margin-left:auto}
  .lede b{font-weight:700;color:var(--espresso)}

  /* arrival stats */
  .arr-stats{display:flex;gap:42px;justify-content:center;margin-top:42px}
  .arr-stats > div{display:flex;flex-direction:column;gap:6px}
  .arr-stats .num{font-family:var(--mono);font-weight:700;font-size:clamp(26px,3vw,44px);
    color:var(--cream);text-shadow:0 2px 20px rgba(70,35,8,.4)}
  .arr-stats .num.jade{color:var(--jade)} .arr-stats .num.shadow{color:#caa9b6}
  .arr-stats label{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;
    text-transform:uppercase;opacity:.72}

  .scrollhint{margin-top:54px;display:flex;flex-direction:column;align-items:center;gap:10px;
    font-family:var(--mono);font-size:11px;letter-spacing:.26em;text-transform:uppercase;opacity:.75}
  .scrollhint i{width:1.5px;height:34px;background:linear-gradient(var(--espresso),transparent);
    animation:fall 1.8s ease-in-out infinite}
  @keyframes fall{0%{transform:scaleY(.3);transform-origin:top;opacity:.3}
    50%{transform:scaleY(1);opacity:.9}100%{transform:scaleY(.3);transform-origin:bottom;opacity:.3}}

  /* ── feature card (scene 2) ── */
  .feature{margin-top:28px;width:380px;max-width:84vw;padding:20px 22px;border-radius:18px;
    background:linear-gradient(165deg,rgba(40,26,12,.72),rgba(30,18,8,.6));
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,210,140,.28);color:var(--cream);
    box-shadow:0 24px 60px -18px rgba(40,20,0,.6)}
  .ft-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
  .ft-tkr{font-family:var(--mono);font-weight:700;font-size:30px;letter-spacing:.02em}
  .ft-name{font-size:12.5px;opacity:.74;margin-top:2px}
  .ft-act{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.12em;
    padding:7px 11px;border-radius:999px;background:rgba(255,206,122,.16);color:var(--gold);
    border:1px solid rgba(255,206,122,.4);white-space:nowrap}
  .ft-act.strong{background:rgba(159,227,177,.16);color:var(--jade);border-color:rgba(159,227,177,.45)}
  .ft-score{margin:20px 0 16px}
  .ft-bar{height:7px;border-radius:6px;background:rgba(255,255,255,.12);overflow:hidden}
  .ft-bar i{display:block;height:100%;border-radius:6px;
    background:linear-gradient(90deg,var(--gold-deep),var(--jade));transition:width 1s cubic-bezier(.2,.7,.2,1)}
  .ft-num{display:flex;align-items:baseline;gap:8px;margin-top:10px;font-family:var(--mono)}
  .ft-num .big{font-size:34px;font-weight:700} .ft-num .of{font-size:12px;opacity:.6}
  .ft-row{display:flex;gap:8px;justify-content:space-between;border-top:1px solid rgba(255,255,255,.12);
    padding-top:14px}
  .ft-row > div{display:flex;flex-direction:column;gap:4px;flex:1}
  .ft-row label{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;opacity:.6}
  .ft-row b{font-family:var(--mono);font-size:17px;font-weight:700}
  .ft-row .jade{color:var(--jade)}

  /* ── ethics columns (scene 3) ── */
  .ethics-cols{display:flex;gap:16px;margin-top:24px;justify-content:flex-end}
  .ecol{flex:1;max-width:210px}
  .ecol-h{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    margin-bottom:12px;font-weight:700}
  .ecol-h.shadow{color:#caa9b6} .ecol-h.jade{color:var(--jade-deep)}
  .echip{display:flex;justify-content:space-between;align-items:center;gap:8px;
    font-family:var(--mono);padding:7px 12px;border-radius:10px;margin-bottom:6px;font-size:12.5px}
  .echip span{font-weight:700} .echip i{font-style:normal;font-size:10.5px;opacity:.7}
  .echip.shadow{background:rgba(40,30,36,.62);color:#d7c2cc;border:1px solid rgba(120,90,105,.4);
    backdrop-filter:blur(8px)}
  .echip.jade{background:rgba(30,60,40,.5);color:var(--jade);border:1px solid rgba(159,227,177,.4);
    backdrop-filter:blur(8px)}

  /* ── forever grid (scene 4) ── */
  .forever-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:34px auto 0;
    max-width:920px}
  .fcard{padding:14px 14px 16px;border-radius:14px;text-align:left;
    background:linear-gradient(160deg,rgba(30,55,40,.6),rgba(20,38,28,.5));
    border:1px solid rgba(159,227,177,.3);backdrop-filter:blur(12px);color:var(--cream);
    box-shadow:0 16px 40px -16px rgba(20,40,20,.5)}
  .fc-tkr{font-family:var(--mono);font-weight:700;font-size:19px;color:var(--jade)}
  .fc-name{font-size:11px;opacity:.75;margin:3px 0 10px;line-height:1.3;height:28px;overflow:hidden}
  .fc-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;
    letter-spacing:.04em;opacity:.7}
  .disclaimer{font-family:var(--mono);font-size:11px;line-height:1.6;opacity:.62;max-width:62ch;
    margin:30px auto 0;color:var(--espresso)}

  /* ── in-world labels ── */
  .lab{position:absolute;transform:translate(-50%,-100%);text-align:center;white-space:nowrap;
    transition:opacity .25s ease;pointer-events:none;padding:5px 9px;border-radius:9px;
    background:rgba(28,18,8,.5);backdrop-filter:blur(5px);border:1px solid rgba(255,225,170,.18)}
  .lab-t{display:block;font-family:var(--mono);font-weight:700;font-size:14px;
    text-shadow:0 1px 8px rgba(20,12,4,.7)}
  .lab-s{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;opacity:.85;
    margin-top:1px;text-shadow:0 1px 6px rgba(20,12,4,.6)}
  .lab-gold .lab-t{color:var(--gold)} .lab-gold .lab-s{color:#ffe1ab}
  .lab-clean .lab-t,.lab-forever .lab-t{color:var(--jade)} .lab-clean .lab-s,.lab-forever .lab-s{color:#c7f0d3}
  .lab-shadow{background:rgba(30,20,26,.62)}
  .lab-shadow .lab-t{color:#e0cdd6} .lab-shadow .lab-s{color:#caa9b6;letter-spacing:.14em}

  /* ── ticker strip ── */
  .ticker{position:absolute;bottom:0;left:0;right:0;height:42px;overflow:hidden;
    background:linear-gradient(rgba(35,22,10,0),rgba(35,22,10,.55));
    display:flex;align-items:center;border-top:1px solid rgba(255,220,160,.18)}
  .tk-track{display:flex;gap:36px;white-space:nowrap;animation:marq 48s linear infinite;padding-left:36px}
  @keyframes marq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .tk{font-family:var(--mono);font-size:12.5px;display:inline-flex;gap:9px;align-items:center;color:var(--cream)}
  .tk b{font-weight:700} .tk em{font-style:normal;opacity:.9}
  .tk.up em{color:var(--jade)} .tk.down em{color:#f0a890}

  /* ── progress rail ── */
  .rail{position:absolute;right:30px;top:50%;transform:translateY(-50%);
    display:flex;align-items:center;gap:14px}
  .rail-track{width:2px;height:200px;background:rgba(51,34,15,.22);border-radius:2px;position:relative}
  .rail-fill{position:absolute;top:0;left:0;width:100%;background:var(--espresso);border-radius:2px;height:0}
  .rail-stops{display:none}
  @media(min-width:900px){
    .rail-stops{display:flex;flex-direction:column;justify-content:space-between;height:200px}
    .rail-stop{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
      opacity:.4;transition:opacity .3s,color .3s;writing-mode:horizontal-tb}
    .rail-stop.on{opacity:1;color:var(--espresso);font-weight:700}
  }

  /* ── tweaks panel ── */
  #tweaks{position:fixed;left:22px;bottom:22px;z-index:40;width:280px;
    background:linear-gradient(160deg,rgba(34,22,10,.92),rgba(24,15,7,.9));
    border:1px solid rgba(255,210,140,.28);border-radius:16px;color:var(--cream);
    padding:0;box-shadow:0 24px 60px -18px rgba(20,10,0,.7);
    opacity:0;transform:translateY(14px) scale(.98);pointer-events:none;
    transition:transform .32s cubic-bezier(.2,.7,.2,1);font-family:var(--ui)}
  #tweaks.open{opacity:1;transform:none;pointer-events:auto}
  .tw-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;
    border-bottom:1px solid rgba(255,210,140,.18);font-family:var(--mono);font-size:12px;
    letter-spacing:.18em;text-transform:uppercase}
  #tw-close{background:none;border:none;color:var(--cream);font-size:20px;cursor:pointer;
    line-height:1;opacity:.7;padding:0 2px}
  #tw-close:hover{opacity:1}
  .tw-row{padding:16px}
  .tw-row label{font-size:12.5px;font-weight:600;display:block;margin-bottom:12px}
  .tw-slide{display:flex;align-items:center;gap:12px}
  #tw-motion{flex:1;accent-color:var(--jade);height:3px}
  #tw-motion-out{font-family:var(--mono);font-size:13px;color:var(--jade);min-width:46px;text-align:right}
  .tw-note{font-size:11px;opacity:.6;margin:12px 0 0;line-height:1.5}

  /* ── explore button + console drawer ── */
  #explore-btn{position:fixed;top:22px;right:36px;z-index:30;display:flex;align-items:center;gap:9px;
    font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--cream);background:linear-gradient(160deg,rgba(36,24,10,.86),rgba(24,15,7,.82));
    border:1px solid rgba(255,210,140,.34);border-radius:999px;padding:11px 18px;cursor:pointer;
    box-shadow:0 14px 40px -16px rgba(20,10,0,.7);backdrop-filter:blur(10px);transition:transform .2s,opacity .25s,background .2s}
  #explore-btn:hover{transform:translateY(-1px);background:linear-gradient(160deg,rgba(46,30,12,.92),rgba(30,19,9,.9))}
  #explore-btn.hide{opacity:0;pointer-events:none;transform:translateX(20px)}
  .ex-dot{width:9px;height:9px;border-radius:50%;background:var(--jade);box-shadow:0 0 12px 2px var(--jade)}

  #console{position:fixed;top:0;right:0;bottom:0;z-index:35;width:440px;max-width:92vw;
    display:flex;flex-direction:column;color:var(--cream);font-family:var(--ui);
    background:linear-gradient(180deg,rgba(26,17,8,.94),rgba(18,11,5,.96));
    border-left:1px solid rgba(255,210,140,.22);box-shadow:-30px 0 80px -30px rgba(0,0,0,.7);
    backdrop-filter:blur(18px);transform:translateX(100%);transition:transform .42s cubic-bezier(.2,.8,.2,1)}
  #console.open{transform:none}
  .cn-head{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 14px}
  .cn-title{font-family:var(--mono);font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700}
  #cn-count{opacity:.55}
  #cn-close{background:none;border:none;color:var(--cream);font-size:24px;cursor:pointer;opacity:.7;line-height:1}
  #cn-close:hover{opacity:1}
  .cn-views{display:flex;gap:6px;padding:0 16px 12px}
  .cn-views button{flex:1;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    padding:9px 4px;border-radius:9px;border:1px solid rgba(255,210,140,.16);background:rgba(255,255,255,.03);
    color:var(--cream);opacity:.6;cursor:pointer;transition:.2s}
  .cn-views button:hover{opacity:.85}
  .cn-views button.on{opacity:1;background:rgba(159,227,177,.14);border-color:rgba(159,227,177,.4);color:var(--jade)}
  .cn-filters{padding:0 16px 12px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid rgba(255,210,140,.12)}
  #cn-q,.cn-selrow select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,210,140,.18);
    border-radius:9px;color:var(--cream);padding:9px 11px;font-family:var(--ui);font-size:13px}
  #cn-q::placeholder{color:rgba(255,246,230,.4)}
  .cn-selrow{display:flex;gap:7px}
  .cn-selrow label{flex:1;display:flex;flex-direction:column;gap:4px;font-family:var(--mono);font-size:9px;
    letter-spacing:.12em;text-transform:uppercase;opacity:.6}
  .cn-selrow select{padding:7px 8px;font-size:11.5px}
  .cn-selrow select option{background:#221509;color:var(--cream)}
  #cn-extra:not(:empty){padding:14px 16px;border-bottom:1px solid rgba(255,210,140,.12)}
  .cn-est label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.7;display:block}
  .cn-est input{width:100%;margin-top:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,210,140,.18);
    border-radius:9px;color:var(--cream);padding:9px 11px;font-family:var(--mono);font-size:14px}
  .cn-est-out{margin-top:12px;display:flex;flex-direction:column;gap:6px}
  .cn-est-out>div{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12.5px}
  .cn-est-out>div span{flex:1;font-weight:700} .cn-est-out>div b{color:var(--jade)} .cn-est-out>div i{font-style:normal;opacity:.55;font-size:11px}
  .cn-port{display:flex;gap:10px}
  .cn-port>div{flex:1;display:flex;flex-direction:column;gap:3px;font-family:var(--mono)}
  .cn-port label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;opacity:.6}
  .cn-port b{font-size:14px} .cn-port .pos{color:var(--jade)} .cn-port .neg{color:#f0a890}
  .cn-note{font-size:12px;opacity:.6;line-height:1.5}
  #cn-list{flex:1;overflow-y:auto;padding:8px 12px 24px;scrollbar-width:thin;scrollbar-color:rgba(255,210,140,.3) transparent}
  #cn-list::-webkit-scrollbar{width:8px} #cn-list::-webkit-scrollbar-thumb{background:rgba(255,210,140,.25);border-radius:8px}
  .cn-row{display:flex;align-items:center;gap:10px;width:100%;text-align:left;cursor:pointer;
    background:rgba(255,255,255,.025);border:1px solid transparent;border-radius:11px;padding:10px 12px;margin-bottom:5px;
    color:var(--cream);transition:.16s;font-family:var(--ui)}
  .cn-row:hover{background:rgba(255,255,255,.07);border-color:rgba(255,210,140,.22)}
  .cn-row.excl{opacity:.5}
  .r-star{font-size:16px;color:rgba(255,246,230,.4);transition:.15s;line-height:1}
  .r-star.on{color:var(--gold)} .r-star:hover{transform:scale(1.2)}
  .r-main{flex:1;display:flex;flex-direction:column;min-width:0}
  .r-main b{font-family:var(--mono);font-size:14px} .r-main i{font-style:normal;font-size:11px;opacity:.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .r-act{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.06em;padding:4px 7px;border-radius:6px;white-space:nowrap}
  .r-px{font-family:var(--mono);font-size:12px;opacity:.8;min-width:54px;text-align:right}
  .r-score{font-family:var(--mono);font-size:15px;font-weight:700;min-width:30px;text-align:right}

  /* action badge palette (shared by rows & detail) */
  .strong{background:rgba(159,227,177,.18);color:var(--jade)} .buy{background:rgba(159,227,177,.12);color:#bfe9cb}
  .hold{background:rgba(255,206,122,.15);color:var(--gold)} .reduce{background:rgba(240,168,144,.16);color:#f0a890}
  .avoid{background:rgba(200,120,120,.16);color:#e69a9a}

  /* ── detail card ── */
  #detail-bg{position:fixed;inset:0;z-index:45;display:flex;align-items:center;justify-content:center;
    background:rgba(18,10,4,.6);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .25s;padding:20px}
  #detail-bg.open{opacity:1;pointer-events:auto}
  #detail-card{position:relative;width:480px;max-width:94vw;max-height:90vh;overflow-y:auto;color:var(--cream);

<body>
  <canvas id="bg"></canvas>
  <div id="vignette"></div>
  <div id="overlay"></div>
  <div id="labels"></div>
  <div id="scroll"><div id="spacer"></div></div>

  <div id="loader">
    <div class="ld-mark">STOCK&nbsp;SIGNAL</div>
    <div class="ld-bar"><i></i></div>
    <div class="ld-sub">Membangun dunia…</div>
  </div>

  <script src="data/world-data.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import { createWorld } from "./js/world/scene.js";
    import * as curate from "./js/world/curate.js";
    import { initOverlay } from "./js/world/overlay.js";
    import { initTutorial } from "./js/world/tutorial.js";

    const world = createWorld(document.getElementById("bg"), curate);
    initOverlay(world);
    // Build help-btn immediately; tutorial auto-opens after loader fades
    // (tutorial z-index 75 sits below loader z-index 90, revealed as loader fades)
    initTutorial();

    // fade loader once the first frames have rendered
    setTimeout(() => document.getElementById("loader").classList.add("gone"), 1400);
    setTimeout(() => document.getElementById("loader").remove(), 2800);
  </script>
</body>
</html>
